$kind: http-request
method: GET
url: "{{baseUrl}}/api/roulette/spin"
description: Get current spin token count for the user. Requires auth.
examples: .resources/Get Spin Tokens.resources/examples
order: 1000
events:
  - listen: post-response
    script:
      content: |-
        pm.test("Status code adalah 200", function () {
            pm.response.to.have.status(200);
        });

        pm.test("Response memiliki field success = true", function () {
            const json = pm.response.json();
            pm.expect(json.success).to.eql(true);
        });

        pm.test("Response memiliki field data.spins (jumlah token)", function () {
            const json = pm.response.json();
            pm.expect(json).to.have.property("data");
            pm.expect(json.data).to.have.property("spins");
            pm.expect(json.data.spins).to.be.a("number");
        });
