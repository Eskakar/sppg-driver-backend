$kind: http-request
method: GET
url: "{{baseUrl}}/api/tugas/history/preview"
description: Get preview list of completed tasks. Requires auth.
examples: .resources/Get History Preview.resources/examples
order: 3000
events:
  - listen: post-response
    script:
      content: |-
        pm.test("Status code adalah 200", function () {
            pm.response.to.have.status(200);
        });

        pm.test("Response memiliki field success = true", function () {
            const json = pm.response.json();
            pm.expect(json.success).to.eql(true);
        });

        pm.test("Response memiliki field data", function () {
            const json = pm.response.json();
            pm.expect(json).to.have.property("data");
        });
